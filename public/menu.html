<!DOCTYPE html>
<html lang="en">
<head>

<title>Ai Paladini | Digital Menu</title>
  
  <meta property="og:title" content="Ai Paladini - Taormina, Sicily">
  <meta property="og:description" content="Explore our digital menu: artisanal pizzas, sandwiches, signature cocktails, and a curated Sicilian wine list.">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Montserrat:wght@400;500;600&display=swap');

  :root {
    --gold: #8B5A2B; --dark: #F4F1EA; --text: #1A1714; --text-dim: #4A4641; --muted: #66605B;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark); color: var(--text); font-family: 'Montserrat', sans-serif; min-height: 100vh; overflow-x: hidden; user-select: none; }
  
  .gate { display: none; position: fixed; inset: 0; background: var(--dark); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; }
  .gate.active { display: flex; }
  .gate-icon { font-size: 48px; margin-bottom: 24px; color: var(--gold); }
  .gate h2 { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 600; margin-bottom: 16px; }

  .session-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 500; background: rgba(244, 241, 234, 0.95); border-bottom: 1px solid rgba(139,90,43,0.15); padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .session-label { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); font-weight:600;}
  .timer-track { flex: 1; height: 3px; background: rgba(0,0,0,0.05); border-radius: 2px; overflow: hidden; }
  .timer-fill { height: 100%; width: 100%; background: #4CAF82; transition: width 1s linear; }
  .timer-text { font-size: 11px; font-weight:600; color: var(--text-dim); }

  .hero { padding-top: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding-bottom: 30px; }
  
  .nav-tabs { position: sticky; top: 40px; z-index: 400; background: rgba(244, 241, 234, 0.97); border-bottom: 1px solid rgba(139,90,43,0.2); display: flex; overflow-x: auto; padding: 0 8px; scrollbar-width: none; }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .tab-btn { background: transparent; border: none; color: var(--muted); padding: 16px 20px; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight:600; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  .menu-section { 
    display: none; 
    padding: 20px 24px 60vh;
    max-width: 740px; 
    margin: 0 auto; 
    min-height: 100vh;
  }
  
  .menu-section.active { 
    display: block; 
    animation: sectionFade 0.4s ease; 
  }
  @keyframes sectionFade { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .category-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; margin-top: 40px; border-bottom: 1px solid rgba(139,90,43,0.2); padding-bottom:10px; }
  .menu-item { border-bottom: 1px solid rgba(0,0,0,0.05); padding: 20px 0; display: grid; grid-template-columns: 1fr auto; gap: 8px 24px; }
  .item-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--text); }
  .item-price { font-size: 16px; font-weight: 600; color: var(--gold); font-family: 'Montserrat', sans-serif; }
  .item-desc { font-size: 13px; color: var(--text-dim); line-height: 1.6; grid-column: 1 / -1; }
  .item-image { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 12px; }

/* --- WINE MENU SPECIAL STYLING --- */
  
body.wine-theme .wine-section {
  background-image: url('/images/pdf-background.jpg'); 
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  background-color: #4A0E17 !important;
  margin-top: 20px;
  border-radius: 20px 20px 0 0;
  box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
}
  
  .wine-section { min-height: 100vh; }
  .wine-section .menu-section { padding: 10px 24px 80px; }
  
  .wine-section .wine-main-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 600;
    color: #E3C27C;
    text-align: center;
    margin: 50px 0 20px;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid rgba(227, 194, 124, 0.3);
    padding-bottom: 10px;
  }
  
  .wine-section .wine-sub-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #F4F1EA;
    text-align: center;
    margin: 30px 0 20px;
    letter-spacing: 5px;
    text-transform: uppercase;
  }

  .wine-section .menu-item { 
    border-bottom: 1px dashed rgba(244, 241, 234, 0.15);
    padding: 16px 0;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px 16px;
    align-items: flex-start;
  }
  
  .wine-section .item-name { 
    color: #FFFFFF; 
    font-size: 20px; 
    font-weight: 600;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  
  .wine-section .item-desc { 
    color: rgba(244, 241, 234, 0.75);
    font-size: 13px;
    font-style: italic;
    line-height: 1.5;
    grid-column: 1 / -1;
  }
  
  .wine-section .item-price { 
    color: #E3C27C; 
    font-size: 18px; 
    font-weight: 700;
  }

  .bio-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: #4CAF82;
    border: 1px solid #4CAF82;
    padding: 2px 6px;
    border-radius: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  @media (max-width: 640px) {
    .wine-section .wine-main-title { font-size: 26px; }
    .wine-section .item-name { font-size: 18px; }
  }

</style>
</head>
<body>

<div class="gate" id="gate-expired">
  <div class="gate-icon">⧖</div>
  <h2>Session <em style="color:var(--gold)">Expired</em></h2>
  <p>Your access has timed out. Please scan the QR code on your table again.</p>
</div>

<div class="gate" id="gate-invalid">
  <div class="gate-icon">✦</div>
  <h2>Access <em style="color:var(--gold)">Restricted</em></h2>
  <p>Please scan the table QR code to access the menu. Reloading is disabled.</p>
</div>

<div class="session-bar" id="session-bar">
  <div style="display: flex; align-items: center; gap: 10px;">
    <span class="session-label">Session</span>
    <span class="timer-text" id="timer-text" style="min-width: 35px;">–:––</span>
  </div>
  
  <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
  
  <select id="lang-switcher" onchange="setLanguage(this.value)" style="background: transparent; border: 1px solid rgba(139,90,43,0.3); color: var(--gold); font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 600; text-transform: uppercase; padding: 4px 6px; border-radius: 4px; cursor: pointer; outline: none;">
    <option value="en">🇬🇧 EN</option>
    <option value="it">🇮🇹 IT</option>
    <option value="es">🇪🇸 ES</option>
    <option value="de">🇩🇪 DE</option>
    <option value="fr">🇫🇷 FR</option>
  </select>
</div>

<header class="hero" id="main-content">
  <img src="/ai_paladini_logo_horizontal.png" alt="Ai Paladini Logo" style="height: 220px; margin-bottom: 10px; mix-blend-mode: multiply;" onerror="this.style.display='none'">
  <p id="subtitle" style="font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: var(--gold); font-weight: 600; text-align: center;">Taormina, Sicily</p>
</header>

<nav class="nav-tabs" id="nav-container" style="display:none;">
  <button class="tab-btn active" onclick="showTab('bar', this)">Bar & Caffetteria</button>
  <button class="tab-btn" onclick="showTab('food', this)">Pizza & Sandwiches</button>
  <button class="tab-btn" onclick="showTab('restaurant', this)">Ristorante</button>
  <button class="tab-btn" onclick="showTab('cocktails', this)">Cocktails</button>
  <button class="tab-btn" onclick="showTab('wine', this)" id="wine-tab" style="display:none;">Wine List</button>
  <button class="tab-btn" onclick="showTab('desserts', this)" id="desserts-tab" style="display:none;">Desserts</button>
</nav>

<div id="search-wrapper" style="display: none; padding: 15px 24px 5px; max-width: 740px; margin: 0 auto;">
  <div style="position: relative;">
    <input type="text" id="menu-search" oninput="filterMenu()" placeholder="Search menu..." style="width: 100%; padding: 12px 15px 12px 40px; border: 1px solid rgba(139,90,43,0.3); border-radius: 25px; background: transparent; color: var(--text); font-family: 'Montserrat', sans-serif; font-size: 14px; outline: none; box-sizing: border-box;">
    <span style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); opacity: 0.5; font-size: 14px;">🔍</span>
  </div>
</div>
  
<div id="dynamic-menu-container"></div>
  
<script>
  // RELOAD PROTECTION
  const navEntries = performance.getEntriesByType("navigation");
  if (navEntries.length > 0 && navEntries[0].type === "reload") {
    document.getElementById('gate-invalid').classList.add('active');
    document.getElementById('main-content').style.display = 'none';
    window.history.replaceState({}, document.title, window.location.pathname);
    throw new Error("Reloaded");
  }
  
// --- GLOBAL CACHE & I18N ---
let globalMenuData = [];
let globalTabsData = [];
let globalCategoriesData = {}; // { tabKey: [...categories] }

const i18n = {
  en: { search: "Search menu...", bar: "Bar & Cafe", food: "Pizza & Sandwiches", restaurant: "Restaurant", cocktails: "Cocktails", wine: "Wine List", desserts: "Desserts", sessionExp: "Session Expired", sessionExpDesc: "Your access has timed out. Please scan the QR code on your table again.", subtitle: "Taormina, Sicily" },
  it: { search: "Cerca nel menù...", bar: "Bar & Caffetteria", food: "Pizza e Panini", restaurant: "Ristorante", cocktails: "Cocktails", wine: "Carta dei Vini", desserts: "Dolci", sessionExp: "Sessione Scaduta", sessionExpDesc: "Il tuo accesso è scaduto. Scansiona nuovamente il QR code al tuo tavolo.", subtitle: "Taormina, Sicilia" },
  es: { search: "Buscar en el menú...", bar: "Bar y Café", food: "Pizza y Bocadillos", restaurant: "Restaurante", cocktails: "Cócteles", wine: "Carta de Vinos", desserts: "Postres", sessionExp: "Sesión Caducada", sessionExpDesc: "Su acceso ha expirado. Vuelva a escanear el código QR en su mesa.", subtitle: "Taormina, Sicilia" },
  de: { search: "Menü durchsuchen...", bar: "Bar & Café", food: "Pizza & Sandwiches", restaurant: "Restaurant", cocktails: "Cocktails", wine: "Weinkarte", desserts: "Nachspeisen", sessionExp: "Sitzung Abgelaufen", sessionExpDesc: "Ihr Zugriff ist abgelaufen. Bitte scannen Sie den QR-Code auf Ihrem Tisch erneut.", subtitle: "Taormina, Sizilien" },
  fr: { search: "Rechercher...", bar: "Bar & Café", food: "Pizza & Sandwichs", restaurant: "Restaurant", cocktails: "Cocktails", wine: "Carte des Vins", desserts: "Desserts", sessionExp: "Session Expirée", sessionExpDesc: "Votre accès a expiré. Veuillez scanner à nouveau le code QR sur votre table.", subtitle: "Taormina, Sicile" }
};

// --- LANGUAGE SWITCHER (unchanged logic) ---
function setLanguage(lang) {
  const t = i18n[lang] || i18n['en'];

  let activeIndex = 0;
  const tabs = document.querySelectorAll('.tab-btn');
  tabs.forEach((btn, index) => {
    if (btn.classList.contains('active')) activeIndex = index;
  });

  tabs.forEach(btn => {
    const text = btn.innerText.toUpperCase();
    if (text.includes('BAR') || text.includes('CAFE') || text.includes('CAFFÈ')) btn.innerText = t.bar;
    if (text.includes('PIZZA') || text.includes('PANINI') || text.includes('SANDWICH')) btn.innerText = t.food;
    if (text.includes('REST')) btn.innerText = t.restaurant;
    if (text.includes('COCKTAIL') || text.includes('CÓCTEL')) btn.innerText = t.cocktails;
  });

  const searchBox = document.getElementById('menu-search');
  if (searchBox) searchBox.placeholder = t.search;

  const subtitleElement = document.getElementById('subtitle');
  if(subtitleElement) {
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.get('menu') === 'wine') {
      subtitleElement.innerHTML = `${t.wine.toUpperCase()}<br><span style="font-size: 10px; letter-spacing: 5px; color: var(--gold); display: block; margin-top: 5px;">${t.subtitle}</span>`;
    } else {
      subtitleElement.innerText = t.subtitle;
    }
  }

  const expGate = document.getElementById('gate-expired');
  if(expGate) {
    expGate.querySelector('h2').innerHTML = `${t.sessionExp.split(' ')[0]} <em style="color:var(--gold)">${t.sessionExp.split(' ').slice(1).join(' ')}</em>`;
    expGate.querySelector('p').innerText = t.sessionExpDesc;
  }

  renderMenu();

  const menuType = new URLSearchParams(window.location.search).get('menu');
  if (menuType !== 'wine' && menuType !== 'desserts') {
    if (tabs[activeIndex]) tabs[activeIndex].click();
  }
}

  function getToken() { return new URLSearchParams(window.location.search).get('token'); }
  function getMenuType() { return new URLSearchParams(window.location.search).get('menu') || 'main'; }

  let sessionExpiry = null;
  let timerInterval = null;

  async function initSession() {
    const token = getToken();
    if (!token) return document.getElementById('gate-invalid').classList.add('active');

    const res = await fetch(`/api/session?token=${token}`);
    const data = await res.json();
    
    if (!data.valid) {
      document.getElementById('main-content').style.display = 'none';
      return document.getElementById('gate-expired').classList.add('active');
    }

    sessionExpiry = data.expiry;
    document.getElementById('nav-container').style.display = 'flex';
    document.getElementById('search-wrapper').style.display = 'block';
    
    const userLang = navigator.language || navigator.userLanguage;
    const langCode = userLang.split('-')[0];
    if(i18n[langCode]) {
      document.getElementById('lang-switcher').value = langCode;
      setLanguage(langCode);
    } else {
      setLanguage('en');
    }

    fetchMenu();
    startTimer();
  }
  
// --- FETCH MENU & CATEGORIES ---
async function fetchMenu() {
  try {
    // Fetch menu items
    const menuRes = await fetch('/api/menu');
    globalMenuData = await menuRes.json();

    // Fetch tabs
    const tabsRes = await fetch('/api/tabs');
    globalTabsData = await tabsRes.json();

    // Fetch categories for each tab
    for (const tab of globalTabsData) {
      const catRes = await fetch(`/api/categories/${tab.key}`);
      globalCategoriesData[tab.key] = await catRes.json();
    }

    renderMenu();
  } catch (err) {
    console.error('Error fetching menu:', err);
  }
}

// --- RENDER MENU WITH SORTING ---
function renderMenu() {
  const urlParams = new URLSearchParams(window.location.search);
  const menuType = urlParams.get('menu');

  const container = document.getElementById('dynamic-menu-container');
  if (!container) return;
  container.innerHTML = '';

  let tabs = ['bar', 'food', 'restaurant', 'cocktails'];
  
  let activeTabName = 'bar';
  const activeBtn = document.querySelector('.tab-btn.active');
  if (activeBtn) {
    const text = activeBtn.innerText.toUpperCase();
    if (text.includes('PIZZA') || text.includes('PANINI') || text.includes('SANDWICH')) activeTabName = 'food';
    else if (text.includes('REST')) activeTabName = 'restaurant';
    else if (text.includes('COCKTAIL') || text.includes('CÓCTEL')) activeTabName = 'cocktails';
  }

  if (menuType === 'wine') {
    document.body.classList.add('wine-theme');
    tabs = ['wine'];
    activeTabName = 'wine';
    if(document.getElementById('wine-tab')) document.getElementById('wine-tab').style.display = 'block';
    if(document.getElementById('desserts-tab')) document.getElementById('desserts-tab').style.display = 'none';
    document.querySelectorAll('.tab-btn').forEach((btn, idx) => { if (idx < 4) btn.style.display = 'none'; });
    container.classList.add('wine-section');
  } else if (menuType === 'desserts') {
    tabs = ['desserts'];
    activeTabName = 'desserts';
    if(document.getElementById('desserts-tab')) document.getElementById('desserts-tab').style.display = 'block';
    if(document.getElementById('wine-tab')) document.getElementById('wine-tab').style.display = 'none';
    document.querySelectorAll('.tab-btn').forEach((btn, idx) => { if (idx < 4) btn.style.display = 'none'; });
  }

  const currentLang = document.getElementById('lang-switcher') ? document.getElementById('lang-switcher').value : 'en';

  tabs.forEach(tab => {
    const section = document.createElement('section');
    section.className = `menu-section ${tab === activeTabName ? 'active' : ''}`;
    section.id = `section-${tab}`;

    // DEFAULT: Pull items for this tab, filter by availability
    let tabItems = globalMenuData.filter(i => i.tab === tab && i.available);

    // CRITICAL: Desserts menu special filtering
    // Keeps Colazione items but excludes eggs/omelettes from breakfast
    if (menuType === 'desserts') {
      tabItems = globalMenuData.filter(i => {
        if (!i.available) return false;
        if (i.tab === 'desserts') return true;
        if (i.category && i.category.includes('Colazione')) {
          const itemName = i.name.toLowerCase();
          if (itemName.includes('uova') || itemName.includes('omelette')) return false;
          return true; 
        }
        return false;
      });
    }

    let html = '';

    if (tab === 'wine') {
      // --- WINE MENU RENDERING ---
      const mainCats = [...new Set(tabItems.map(i => i.category.split(' - ')[0]))];
      
      // Sort main categories by Category.sortOrder from database
      mainCats.sort((a, b) => {
        const catA = globalCategoriesData['wine']?.find(c => c.name.split(' - ')[0] === a);
        const catB = globalCategoriesData['wine']?.find(c => c.name.split(' - ')[0] === b);
        const orderA = catA ? catA.sortOrder : 999;
        const orderB = catB ? catB.sortOrder : 999;
        return orderA - orderB;
      });

      mainCats.forEach(mainCat => {
        html += `<div class="wine-main-title">${mainCat}</div>`;
        const subCats = [...new Set(tabItems.filter(i => i.category.startsWith(mainCat)).map(i => i.category.split(' - ')[1] || ''))];
        
        subCats.sort((a, b) => {
          const targetA = a ? `${mainCat} - ${a}` : mainCat;
          const targetB = b ? `${mainCat} - ${b}` : mainCat;
          const catA = globalCategoriesData['wine']?.find(c => c.name === targetA);
          const catB = globalCategoriesData['wine']?.find(c => c.name === targetB);
          const orderA = catA ? catA.sortOrder : 999;
          const orderB = catB ? catB.sortOrder : 999;
          return orderA - orderB;
        });

        subCats.forEach(subCat => {
          if (subCat) html += `<div class="wine-sub-title">${subCat}</div>`;
          const targetCategory = subCat ? `${mainCat} - ${subCat}` : mainCat;

          // Sort items within this category by sortOrder
          const catItems = tabItems.filter(i => i.category === targetCategory);
          catItems.sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));

          catItems.forEach(item => {
            let selectedDesc = item.desc_en || item.desc_it || item.desc || '';
            if (currentLang === 'it' && item.desc_it) selectedDesc = item.desc_it;
            if (currentLang === 'es' && item.desc_es) selectedDesc = item.desc_es;
            if (currentLang === 'de' && item.desc_de) selectedDesc = item.desc_de;
            if (currentLang === 'fr' && item.desc_fr) selectedDesc = item.desc_fr;

            let badges = '';
            if (item.isVegetarian) badges += '<span title="Vegetarian" style="font-size: 16px; margin-left: 4px;">🥕</span>';
            if (item.isVegan) badges += '<span title="Vegan" style="font-size: 16px; margin-left: 4px;">🌱</span>';
            if (item.isGlutenFree) badges += '<span title="Gluten-Free" style="font-size: 16px; margin-left: 4px;">🌾</span>';

            const isBio = (item.name && item.name.includes('BIO')) || (item.desc && item.desc.includes('BIO')) || (item.desc_it && item.desc_it.includes('BIO')) || (item.desc_en && item.desc_en.includes('BIO'));
            if (isBio) badges += '<span class="bio-badge" style="margin-left: 6px;">🍃 BIO</span>';

            let cleanName = item.name ? item.name.replace(/\bBIO\b/g, '').trim() : '';
            let cleanDesc = selectedDesc ? selectedDesc.replace(/\bBIO\b/g, '').trim() : '';

            html += `
              <div class="menu-item" onclick="trackClick('${item.id}')">
                <div class="item-name">${cleanName} ${badges}</div>
                <div class="item-price">${item.price}</div>
                ${cleanDesc ? `<div class="item-desc">${cleanDesc}</div>` : ''}
              </div>
            `;
          });
        });
      });
    } else {
      // --- REGULAR MENU RENDERING ---
      let categories = [...new Set(tabItems.map(i => i.category))];
      
      // Sort categories by their sortOrder from the Category database
      categories.sort((a, b) => {
        const catA = globalCategoriesData[tab]?.find(c => c.name === a);
        const catB = globalCategoriesData[tab]?.find(c => c.name === b);
        const orderA = catA ? catA.sortOrder : 999;
        const orderB = catB ? catB.sortOrder : 999;
        return orderA - orderB;
      });

      // Special handling for Desserts menu: custom category order
      if (menuType === 'desserts') {
        const order = ['Gelateria / Ice cream', 'Dolci / Desserts', 'Colazione / Breakfast'];
        categories.sort((a, b) => {
          let valA = order.includes(a) ? order.indexOf(a) : 99;
          let valB = order.includes(b) ? order.indexOf(b) : 99;
          return valA - valB;
        });
      }

      categories.forEach(cat => {
        let displayCat = cat;
        if (menuType === 'desserts' && cat === 'Colazione / Breakfast') {
          displayCat = 'Pasticceria / Pastries'; 
        }

        html += `<div class="category-title">${displayCat}</div>`;
        
        // Sort items within category by their sortOrder field
        const catItems = tabItems.filter(i => i.category === cat);
        catItems.sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));

        catItems.forEach(item => {
          let selectedDesc = item.desc_en || item.desc_it || item.desc || '';
          if (currentLang === 'it' && item.desc_it) selectedDesc = item.desc_it;
          if (currentLang === 'es' && item.desc_es) selectedDesc = item.desc_es;
          if (currentLang === 'de' && item.desc_de) selectedDesc = item.desc_de;
          if (currentLang === 'fr' && item.desc_fr) selectedDesc = item.desc_fr;

          let badges = '';
          if (item.isVegetarian) badges += '<span title="Vegetarian" style="font-size: 16px; margin-left: 4px;">🥕</span>';
          if (item.isVegan) badges += '<span title="Vegan" style="font-size: 16px; margin-left: 4px;">🌱</span>';
          if (item.isGlutenFree) badges += '<span title="Gluten-Free" style="font-size: 16px; margin-left: 4px;">🌾</span>';

          const isBio = item.name && item.name.includes('BIO');
          if (isBio) badges += '<span class="bio-badge" style="margin-left: 6px;">🍃 BIO</span>';
          let cleanName = item.name ? item.name.replace(/\bBIO\b/g, '').trim() : '';

          html += `
            <div class="menu-item" onclick="trackClick('${item.id}')">
              ${item.image ? `<img src="${item.image}" alt="${cleanName}" class="item-image">` : ''}
              <div class="item-name">${cleanName} ${badges}</div>
              <div class="item-price">${item.price}</div>
              ${selectedDesc ? `<div class="item-desc">${selectedDesc}</div>` : ''}
            </div>
          `;
        });
      });
    }
    section.innerHTML = html;
    container.appendChild(section);
  });
}

  // --- SEARCH FILTER (unchanged) ---
  function filterMenu() {
    const query = document.getElementById('menu-search').value.toLowerCase();
    const items = document.querySelectorAll('.menu-item');
    const titles = document.querySelectorAll('.category-title, .wine-main-title, .wine-sub-title');
    
    items.forEach(item => {
      const text = item.innerText.toLowerCase();
      if (text.includes(query)) {
        item.style.display = '';
      } else {
        item.style.display = 'none';
      }
    });

    titles.forEach(title => {
      title.style.display = query.length > 0 ? 'none' : '';
    });
  }
  
  function showTab(name, btn) {
    document.getElementById('menu-search').value = '';
    filterMenu();
    document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('section-' + name).classList.add('active');
    btn.classList.add('active');
  }

  function startTimer() {
    timerInterval = setInterval(() => {
      const remaining = sessionExpiry - Date.now();
      if (remaining <= 0) {
        clearInterval(timerInterval);
        document.querySelectorAll('.menu-section').forEach(s => s.style.display = 'none');
        document.getElementById('nav-container').style.display = 'none';
        document.getElementById('session-bar').style.display = 'none';
        document.getElementById('gate-expired').classList.add('active');
        return;
      }
      const mins = Math.floor(remaining / 60000);
      const secs = Math.floor((remaining % 60000) / 1000);
      document.getElementById('timer-text').textContent = `${mins}:${String(secs).padStart(2, '0')}`;
      document.getElementById('timer-fill').style.width = Math.max(0, (remaining / (30*60*1000)) * 100) + '%';
    }, 1000);
  }

  document.addEventListener('contextmenu', e => e.preventDefault());

  function trackClick(id) {
    fetch('/api/menu/track', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id })
    }).catch(err => console.log('Tracking ignored'));
  }

  initSession();
</script>
