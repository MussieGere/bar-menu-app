<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Ai Paladini</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Montserrat:wght@400;500;600&display=swap');
  body { background: #F4F1EA; color: #1A1714; font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 350px; }
  h2 { font-family: 'Cormorant Garamond', serif; font-size: 28px; color: #8B5A2B; margin-bottom: 20px; }
  input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
  button { width: 100%; padding: 12px; background: #8B5A2B; color: white; border: none; font-weight: 600; cursor: pointer; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .error { color: #d32f2f; font-size: 12px; margin-bottom: 15px; display: none; font-weight: 600; }
</style>
</head>
<body>

  <img src="/images/logo-text.png" alt="Ai Paladini" style="height: 60px; mix-blend-mode: multiply; margin-bottom: 30px;">
  
  <div class="login-box">
    <h2>Staff Portal</h2>
    <div id="error-msg" class="error">Invalid password. Please try again.</div>
    <form id="loginForm">
      <input type="password" id="password" placeholder="Enter Master Password" required>
      <button type="submit">Authenticate</button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      
      if (res.ok) {
        window.location.href = '/admin.html';
      } else {
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('password').value = '';
      }
    });
  </script>
</body>
</html>
